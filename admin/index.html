<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Chest — Site Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #111;
      --surface: #1a1a1a;
      --border:  rgba(255,255,255,.08);
      --red:     #E63228;
      --cream:   #F0EBE3;
      --muted:   #888;
      --input:   #0f0f0f;
    }
    html, body { height: 100%; font-family: 'Barlow', system-ui, sans-serif; background: var(--bg); color: var(--cream); }

    /* ── AUTH SCREEN ─────────────────────────────────────────────────────── */
    #view-login {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 24px; text-align: center;
    }
    #view-login h1 { font-size: 28px; font-weight: 900; letter-spacing: -.02em; }
    #view-login p  { color: var(--muted); font-size: 14px; }
    .login-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px; background: var(--red); color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      letter-spacing: .12em; text-transform: uppercase; border: none; cursor: pointer;
    }
    .login-btn:hover { background: #c8241b; }

    /* ── LOADING ─────────────────────────────────────────────────────────── */
    #view-loading {
      display: none; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px; border: 2px solid rgba(255,255,255,.1);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EDITOR LAYOUT ───────────────────────────────────────────────────── */
    #view-editor { display: none; height: 100vh; flex-direction: column; }

    /* Header */
    .hdr {
      display: flex; align-items: center; gap: 20px;
      padding: 0 24px; height: 54px; background: #0a0a0a;
      border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
    }
    .hdr-logo {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--red); white-space: nowrap;
    }
    .hdr-sep { width: 1px; height: 20px; background: var(--border); }
    .hdr-section { font-size: 13px; color: var(--muted); flex: 1; }
    .hdr-status {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: .08em; color: var(--muted); white-space: nowrap;
    }
    .hdr-status.saved   { color: #4ade80; }
    .hdr-status.saving  { color: #fbbf24; }
    .hdr-status.error   { color: var(--red); }
    .hdr-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: .1em; text-transform: uppercase; border: none; cursor: pointer; white-space: nowrap;
    }
    .hdr-btn-save  { background: var(--red); color: #fff; }
    .hdr-btn-save:hover { background: #c8241b; }
    .hdr-btn-save:disabled { background: #444; cursor: not-allowed; }
    .hdr-btn-view  { background: transparent; color: var(--muted); border: 1px solid var(--border); text-decoration: none; }
    .hdr-btn-view:hover { color: var(--cream); border-color: rgba(255,255,255,.2); }
    .hdr-btn-logout { background: transparent; color: #555; border: none; font-size: 10px; }
    .hdr-btn-logout:hover { color: var(--muted); }

    /* Body split */
    .editor-body { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 200px; flex-shrink: 0; background: #0a0a0a;
      border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 18px; border: none; background: transparent; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: .08em; text-transform: uppercase; color: #666;
      text-align: left; border-left: 2px solid transparent; transition: all .15s;
    }
    .sidebar-item:hover { color: var(--cream); background: rgba(255,255,255,.03); }
    .sidebar-item.active { color: var(--cream); border-left-color: var(--red); background: rgba(230,50,40,.06); }
    .sidebar-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* Main content */
    .editor-main { flex: 1; overflow-y: auto; padding: 40px 48px 80px; }
    .section-heading {
      font-size: 22px; font-weight: 900; letter-spacing: -.02em; margin-bottom: 6px;
    }
    .section-sub {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 36px;
    }

    /* Field groups */
    .field-group { margin-bottom: 36px; }
    .field-group-title {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--red);
      border-bottom: 1px solid rgba(230,50,40,.2); padding-bottom: 8px; margin-bottom: 20px;
    }
    .fields-grid { display: flex; flex-direction: column; gap: 20px; }
    .fields-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Individual field */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
    }
    .field input, .field textarea {
      background: var(--input); border: 1px solid rgba(255,255,255,.1);
      color: var(--cream); font-family: 'Barlow', sans-serif; font-size: 15px;
      padding: 11px 14px; outline: none; width: 100%;
      transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--red); }
    .field input::placeholder, .field textarea::placeholder { color: #333; }
    .field textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    .field-hint {
      font-size: 12px; color: #555; line-height: 1.4;
    }

    /* Preview link in section */
    .preview-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: .1em; text-transform: uppercase; color: #444;
      text-decoration: none; margin-bottom: 32px;
    }
    .preview-link:hover { color: var(--muted); }

    /* Unsaved changes indicator */
    .unsaved-bar {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      background: #1a1a1a; border: 1px solid var(--border);
      padding: 12px 20px; display: none; align-items: center; gap: 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .unsaved-bar.visible { display: flex; }
    .unsaved-save {
      background: var(--red); color: #fff; border: none; cursor: pointer;
      padding: 8px 16px; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    }
    .unsaved-save:hover { background: #c8241b; }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────────────── -->
<div id="view-login">
  <div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:12px;">Hidden Chest Studio</div>
    <h1>Site Editor</h1>
    <p style="margin-top:8px;">Sign in to edit your website content</p>
  </div>
  <button class="login-btn" onclick="netlifyIdentity.open()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Sign In
  </button>
</div>

<!-- ── LOADING ─────────────────────────────────────────────────────────────── -->
<div id="view-loading">
  <div class="spinner"></div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;">Loading content…</div>
</div>

<!-- ── EDITOR ──────────────────────────────────────────────────────────────── -->
<div id="view-editor">
  <header class="hdr">
    <span class="hdr-logo">HC Studio</span>
    <div class="hdr-sep"></div>
    <span class="hdr-section" id="hdr-section-name">Site Editor</span>
    <span class="hdr-status" id="hdr-status"></span>
    <a href="https://sparkly-buttercream-86e597.netlify.app" target="_blank" class="hdr-btn hdr-btn-view">
      View Live Site ↗
    </a>
    <button class="hdr-btn hdr-btn-save" id="btn-save" onclick="saveContent()">Save Changes</button>
    <button class="hdr-btn hdr-btn-logout" onclick="netlifyIdentity.logout()">Sign out</button>
  </header>

  <div class="editor-body">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="editor-main" id="editor-main"></main>
  </div>
</div>

<!-- Floating save bar -->
<div class="unsaved-bar" id="unsaved-bar">
  Unsaved changes
  <button class="unsaved-save" onclick="saveContent()">Save Now</button>
</div>

      { key:'svc3Desc',  label:'Description', type:'textarea' },
      { key:'svc3Tags',  label:'Tags',        type:'text',     hint:'Comma-separated' },
    ]},
  ]},
  { id:'flagship', label:'Flagship Game', anchor:'#flagship', fields:[
  ], groups:[
    { title:'Games Grid Card (small)', cols:2, fields:[
      { key:'flagshipTitleEm',      label:'Title — italic part',      type:'text',     hint:'e.g. Midwest 90:' },
      { key:'flagshipTitle',        label:'Title — plain part',       type:'text',     hint:'e.g. Rapid City' },
      { key:'flagshipDescription',  label:'Short description',        type:'textarea', hint:'Shown in the bento grid card' },

    ]},

  ]},

  ]},
];

// ── STATE ────────────────────────────────────────────────────────────────────
var content = {};
var fileSha  = '';
var token    = '';
var hasChanges = false;
var currentSection = 'hero';

// ── AUTH ─────────────────────────────────────────────────────────────────────
netlifyIdentity.on('init', function(user) {
  if (user) { token = user.token.access_token; startEditor(); }
});
netlifyIdentity.on('login', function(user) {
  netlifyIdentity.close();
  token = user.token.access_token;
  startEditor();
});
netlifyIdentity.on('logout', function() {
  show('view-login');
});

// ── VIEWS ────────────────────────────────────────────────────────────────────
function show(id) {
  ['view-login','view-loading','view-editor'].forEach(function(v) {
    document.getElementById(v).style.display = 'none';
  });
  document.getElementById(id).style.display = id === 'view-editor' ? 'flex' : 'flex';
  if (id === 'view-editor') document.getElementById(id).style.flexDirection = 'column';
}

// ── START EDITOR ─────────────────────────────────────────────────────────────
function startEditor() {
  show('view-loading');
  // Refresh token if needed
  var user = netlifyIdentity.currentUser();
  user.jwt().then(function(t) {
    token = t;
    return fetch('/.netlify/git/github/contents/content.json', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      fileSha  = data.sha;
      content  = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
      buildEditor();
      show('view-editor');
    })
    .catch(function(e) {
      console.error(e);
      // Fallback: try fetching content.json directly
      fetch('/content.json')
        .then(function(r) { return r.json(); })
        .then(function(c) {
          content = c;
          fileSha = '';
          buildEditor();
          show('view-editor');
        })
        .catch(function() {
          alert('Could not load content. Check your Netlify Identity setup.');
          show('view-login');
        });
    });
}

// ── BUILD UI ─────────────────────────────────────────────────────────────────
function buildEditor() {
  buildSidebar();
  showSection(currentSection);
}

function buildSidebar() {
  var sb = document.getElementById('sidebar');
  sb.innerHTML = SECTIONS.map(function(s) {
    return '<button class="sidebar-item" data-id="' + s.id + '" onclick="showSection(\'' + s.id + '\')">'
         + '<span class="sidebar-dot"></span>' + s.label + '</button>';
  }).join('');
}

function showSection(id) {
  currentSection = id;
  // Update sidebar active state
  document.querySelectorAll('.sidebar-item').forEach(function(b) {
    b.classList.toggle('active', b.dataset.id === id);
  });
  var sec = SECTIONS.find(function(s) { return s.id === id; });
  if (!sec) return;
  document.getElementById('hdr-section-name').textContent = sec.label;

  var html = '';
  // Section title
  html += '<div class="section-heading">' + sec.label + '</div>';
  html += '<div class="section-sub">Edit ' + sec.label.toLowerCase() + ' content</div>';
  // View on site link
  if (sec.anchor) {
    html += '<a class="preview-link" href="https://sparkly-buttercream-86e597.netlify.app' + sec.anchor + '" target="_blank">'
          + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
          + 'View this section on live site</a>';
  }
  // Main fields (single column)
  if (sec.fields && sec.fields.length) {
    html += '<div class="field-group"><div class="fields-grid">';
    sec.fields.forEach(function(f) {
      html += renderField(f);
    });
    html += '</div></div>';
  }
  // Field groups
  if (sec.groups) {
    sec.groups.forEach(function(g) {
      html += '<div class="field-group">';
      html += '<div class="field-group-title">' + g.title + '</div>';
      html += '<div class="' + (g.cols === 2 ? 'fields-2col' : 'fields-grid') + '">';
      g.fields.forEach(function(f) {
        html += renderField(f);
      });
      html += '</div></div>';
    });
  }

  document.getElementById('editor-main').innerHTML = html;
  document.getElementById('editor-main').scrollTop = 0;
}

function renderField(f) {
  var val = (content[f.key] !== undefined && content[f.key] !== null) ? content[f.key] : '';
  var inp = '';
  if (f.type === 'textarea') {
    inp = '<textarea rows="3" data-key="' + f.key + '" onchange="updateField(this)" oninput="markDirty()">'
        + escHtml(val) + '</textarea>';
  } else {
    inp = '<input type="text" data-key="' + f.key + '" value="' + escAttr(val) + '"'
        + ' onchange="updateField(this)" oninput="markDirty()">';
  }
  return '<div class="field">'
       + '<div class="field-label">' + f.label + '</div>'
       + inp
       + (f.hint ? '<div class="field-hint">' + f.hint + '</div>' : '')
       + '</div>';
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

function updateField(el) {
  content[el.dataset.key] = el.value;
  markDirty();
}

function markDirty() {
  if (!hasChanges) {
    hasChanges = true;
    document.getElementById('unsaved-bar').classList.add('visible');
    setStatus('');
  }
}

function setStatus(msg, cls) {
  var el = document.getElementById('hdr-status');
  el.textContent = msg;
  el.className = 'hdr-status' + (cls ? ' ' + cls : '');
}

// ── SAVE ─────────────────────────────────────────────────────────────────────
function saveContent() {
  var btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  setStatus('Saving…', 'saving');

  // Collect latest values from the DOM inputs/textareas
  document.querySelectorAll('[data-key]').forEach(function(el) {
    content[el.dataset.key] = el.value;
  });

  var jsonStr = JSON.stringify(content, null, 2);
  var encoded = btoa(unescape(encodeURIComponent(jsonStr)));

  var user = netlifyIdentity.currentUser();
  user.jwt().then(function(t) {
    token = t;
    var body = { message: 'Update site content', content: encoded };
    if (fileSha) body.sha = fileSha;
    return fetch('/.netlify/git/github/contents/content.json', {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(data) {
    if (data.content) fileSha = data.content.sha;
    hasChanges = false;
    document.getElementById('unsaved-bar').classList.remove('visible');
    setStatus('✓ Saved — deploying…', 'saved');
    btn.disabled = false;
    btn.textContent = 'Save Changes';
    setTimeout(function() { setStatus(''); }, 4000);
  }).catch(function(e) {
    console.error(e);
    setStatus('Save failed — try again', 'error');
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  });
}

// Warn before closing with unsaved changes
window.addEventListener('beforeunload', function(e) {
  if (hasChanges) { e.preventDefault(); e.returnValue = ''; }
});
</script>
</body>
