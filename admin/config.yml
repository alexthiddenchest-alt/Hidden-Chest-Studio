backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

collections:
  - name: settings
    label: Site Content
    files:
      - name: content
        label: All Content
        file: content.json
        format: json
        fields:

          # ─── HERO ──────────────────────────────────────────────────────────
          - label: "Hero — Tagline (red eyebrow text)"
            name: heroTagline
            widget: string
            hint: "e.g. Game Development Studio · Kuala Lumpur"

          - label: "Hero — Headline (plain)"
            name: heroHeadline
            widget: string
            hint: "e.g. Your game"

          - label: "Hero — Headline (italic/red)"
            name: heroHeadlineEm
            widget: string
            hint: "e.g. idea."

          - label: "Hero — Headline Line 2"
            name: heroHeadline2
            widget: string
            hint: "e.g. Built and shipped."

          - label: "Hero — Description"
            name: heroDescription
            widget: text

          - label: "Hero — YouTube Video ID"
            name: heroVideoId
            widget: string
            hint: "The ID after watch?v= in the YouTube URL, e.g. jbaT0JWABKA"

          # ─── WHO WE ARE ────────────────────────────────────────────────────
          - label: "About — Heading line 1"
            name: aboutHeading1
            widget: string
            hint: "e.g. A studio built"

          - label: "About — Heading line 2"
            name: aboutHeading2
            widget: string
            hint: "e.g. on craft, community,"

          - label: "About — Heading italic line (red)"
            name: aboutHeadingEm
            widget: string
            hint: "e.g. and creativity."

          - label: "About — Paragraph 1"
            name: aboutP1
            widget: text

          - label: "About — Paragraph 2"
            name: aboutP2
         