backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

collections:
  - name: settings
    label: Site Content
    files:
      - name: content
        label: All Content
        file: content.json
        format: json
        fields:

          # ─── HERO ──────────────────────────────────────────────────────────
          - label: "Hero — Tagline (red eyebrow text)"
            name: heroTagline
            widget: string
            hint: "e.g. Game Development Studio · Kuala Lumpur"

          - label: "Hero — Headline (plain)"
            name: heroHeadline
            widget: string
            hint: "e.g. Your game"

          - label: "Hero — Headline (italic/red)"
            name: heroHeadlineEm
            widget: string
            hint: "e.g. idea."

          - label: "Hero — Headline Line 2"
            name: heroHeadline2
            widget: string
            hint: "e.g. Built and shipped."

          - label: "Hero — Description"
            name: heroDescription
            widget: text

          - label: "Hero — YouTube Video ID"
            name: heroVideoId
            widget: string
            hint: "The ID after watch?v= in the YouTube URL, e.g. jbaT0JWABKA"

          - label: "Hero — Stat 1 Label (e.g. Founded)"
            name: heroStat1Label
            widget: string

          - label: "Hero — Stat 1 Value (e.g. 2020)"
            name: heroStat1Val
            widget: string

          - label: "Hero — Stat 2 Label (e.g. Based In)"
            name: heroStat2Label
            widget: string

          - label: "Hero — Stat 2 Value (e.g. Kuala Lumpur)"
            name: heroStat2Val
            widget: string

          - label: "Hero — Stat 3 Label (e.g. Engine)"
            name: heroStat3Label
            widget: string

          - label: "Hero — Stat 3 Value (e.g. Unity · Godot)"
            name: heroStat3Val
            widget: string

          - label: "Hero — Stat 4 Label (e.g. Flagship IP)"
            name: heroStat4Label
        